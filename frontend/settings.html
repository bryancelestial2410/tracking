<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>System Settings – NCF CHS-CSR</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark:  #1a4731;
      --green-mid:   #2d6a4f;
      --green-light: #52b788;
      --green-pale:  #d8f3dc;
      --green-mist:  #f0faf3;
      --white:       #ffffff;
      --gray-100:    #f7f9f8;
      --gray-200:    #eef2ef;
      --gray-300:    #d1d9d4;
      --gray-500:    #7a9187;
      --gray-700:    #3d5047;
      --text:        #1c2b23;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--green-mist); min-height: 100vh; display: flex; flex-direction: column; }
    .blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
    .blob-1 { width: 500px; height: 500px; top: -160px; right: -160px; background: radial-gradient(circle, #b7e4c7 0%, transparent 65%); }
    .blob-2 { width: 400px; height: 400px; bottom: -120px; left: -120px; background: radial-gradient(circle, #95d5b2 0%, transparent 65%); }

    .navbar { position: sticky; top: 0; z-index: 100; background: var(--white); border-bottom: 1px solid var(--gray-200); box-shadow: 0 2px 16px rgba(26,71,49,0.06); height: 66px; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; }
    .brand { display: flex; align-items: center; gap: 11px; text-decoration: none; }
    .brand-icon { width: 38px; height: 38px; background: var(--green-dark); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .brand-name { font-family: 'DM Serif Display', serif; font-size: 21px; color: var(--green-dark); }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green-dark); color: var(--white); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; }
    .user-details { text-align: right; }
    .user-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .user-role { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--green-mid); }

    .main { flex: 1; padding: 48px 32px; position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; width: 100%; }
    .page-header { margin-bottom: 36px; animation: fadeUp 0.5s ease both; }
    .page-header h1 { font-family: 'DM Serif Display', serif; font-size: 34px; color: var(--text); margin-bottom: 6px; }
    .page-header p { font-size: 14px; color: var(--gray-500); }

    .section-card { background: var(--white); border-radius: 20px; box-shadow: 0 4px 24px rgba(26,71,49,0.08); padding: 32px; margin-bottom: 28px; animation: fadeUp 0.5s ease 0.1s both; }
    .section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .section-icon { width: 52px; height: 52px; background: var(--green-pale); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
    .section-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
    .section-subtitle { font-size: 13px; color: var(--gray-500); margin-top: 2px; }



    /* Search + Add */
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .search-wrap { position: relative; flex: 1; }
    .search-wrap input { width: 100%; padding: 10px 16px 10px 40px; border-radius: 12px; border: 1.5px solid var(--gray-300); font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--gray-100); color: var(--text); outline: none; transition: border-color 0.2s; }
    .search-wrap input:focus { border-color: var(--green-light); background: var(--white); }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }
    .btn-add { padding: 10px 20px; background: var(--green-dark); color: #fff; border: none; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; transition: background 0.2s; }
    .btn-add:hover { background: var(--green-mid); }

    /* Table */
    .table-wrap { overflow-x: auto; border-radius: 14px; border: 1.5px solid var(--gray-200); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: var(--gray-100); }
    thead th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--gray-500); white-space: nowrap; }
    tbody tr { border-top: 1px solid var(--gray-200); transition: background 0.15s; }
    tbody tr:hover { background: var(--green-mist); }
    tbody td { padding: 13px 16px; color: var(--text); vertical-align: middle; }
    .td-num { color: var(--gray-500); font-size: 12px; font-weight: 600; width: 40px; }
    .td-code { font-size: 11px; color: var(--gray-500); font-weight: 500; white-space: nowrap; }
    .td-name { font-weight: 600; }
    .td-unit { font-size: 12px; color: var(--gray-500); }
    .qty-pill { display: inline-flex; align-items: center; justify-content: center; background: var(--green-pale); color: var(--green-dark); font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 20px; }
    .condition-pill { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
    .condition-good { background: #d8f3dc; color: #1a4731; }
    .condition-defective { background: #fdecea; color: #c0392b; }
    .condition-mixed { background: #fff3cd; color: #92600a; }
    .location-tag { font-size: 11px; font-weight: 600; color: var(--green-mid); background: var(--green-pale); padding: 3px 10px; border-radius: 8px; white-space: nowrap; }
    .actions { display: flex; gap: 6px; }
    .btn-edit { padding: 5px 14px; background: #e8f4fd; color: #1a6fa8; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
    .btn-edit:hover { background: #cce4f7; }
    .btn-del { padding: 5px 14px; background: #fdecea; color: #c0392b; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
    .btn-del:hover { background: #f9b8b3; }

    .ideal-stock { font-size: 12px; color: var(--gray-500); }
    .supply-num { font-weight: 600; color: var(--text); }

    .count-label { font-size: 13px; color: var(--gray-500); margin-bottom: 12px; }
    .count-label strong { color: var(--text); }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 24px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 24px 80px rgba(0,0,0,0.22); animation: fadeUp 0.3s ease; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h2 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
    .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--gray-500); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-500); margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-300); border-radius: 10px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group select:focus { border-color: var(--green-light); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-save { width: 100%; padding: 12px; background: var(--green-dark); color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 8px; transition: background 0.2s; }
    .btn-save:hover { background: var(--green-mid); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) {
      .main { padding: 28px 16px; }
      .navbar { padding: 0 20px; }
      .section-card { padding: 20px 16px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

      </div>
      <div class="form-group">

      </div>
      <div class="form-row">
        <div class="form-group">

          <input type="number" id="f-ideal" placeholder="525">
        </div>
        <div class="form-group">
          <label>Total Stock</label>
          <input type="number" id="f-total" placeholder="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Supply on Hand</label>
          <input type="number" id="f-supply" placeholder="0">
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="f-location" placeholder="CSR CABINET 1A">
        </div>
      </div>
      <div class="form-group">
        <label>Item Condition</label>
        <input type="text" id="f-condition" placeholder="good condition">
      </div>
      <button class="btn-save" onclick="saveItem()">Save Item</button>
    </div>
  </div>

  let editingIndex = null;

  function conditionClass(c) {
    if (!c) return 'condition-mixed';
    const lc = c.toLowerCase();
    if (lc === 'defective') return 'condition-defective';
    if (lc.includes('defective') || lc.includes('damaged') || lc.includes('old') || lc.includes('rust') || lc.includes('incomplete')) return 'condition-mixed';
    return 'condition-good';
  }

  function renderTable(data) {
    const tbody = document.getElementById('inventory-body');
    document.getElementById('count-label').innerHTML = `Showing <strong>${data.length}</strong> of <strong>${inventoryData.length}</strong> items`;
    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--gray-500);">No items found.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map((item, i) => `
      <tr>
        <td class="td-num">${inventoryData.indexOf(item) + 1}</td>
        <td class="td-code">${item.code}</td>
        <td class="td-name">${item.name}</td>
        <td class="td-unit">${item.unit}</td>
        <td class="ideal-stock">${item.ideal}</td>
        <td><span class="qty-pill">${item.total} ${item.unit}</span></td>
        <td class="supply-num">${item.supply}</td>
        <td><span class="location-tag">${item.location}</span></td>
        <td><span class="condition-pill ${conditionClass(item.condition)}">${item.condition || '—'}</span></td>
        <td>
          <div class="actions">
            <button class="btn-edit" onclick="openEditModal(${inventoryData.indexOf(item)})">Edit</button>
            <button class="btn-del" onclick="deleteItem(${inventoryData.indexOf(item)})">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function filterTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = inventoryData.filter(item =>
      item.name.toLowerCase().includes(q) ||
      item.code.toLowerCase().includes(q) ||
      item.location.toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  function openAddModal() {
    editingIndex = null;
    document.getElementById('modal-title').textContent = 'Add Item';
    ['f-code','f-name','f-unit','f-ideal','f-total','f-supply','f-location','f-condition'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-ideal').value = 525;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function openEditModal(idx) {
    editingIndex = idx;
    const item = inventoryData[idx];
    document.getElementById('modal-title').textContent = 'Edit Item';
    document.getElementById('f-code').value = item.code;
    document.getElementById('f-name').value = item.name;
    document.getElementById('f-unit').value = item.unit;
    document.getElementById('f-ideal').value = item.ideal;
    document.getElementById('f-total').value = item.total;
    document.getElementById('f-supply').value = item.supply;
    document.getElementById('f-location').value = item.location;
    document.getElementById('f-condition').value = item.condition;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function saveItem() {
    const item = {
      code: document.getElementById('f-code').value.trim(),
      name: document.getElementById('f-name').value.trim(),
      unit: document.getElementById('f-unit').value.trim(),
      ideal: parseInt(document.getElementById('f-ideal').value) || 525,
      total: parseInt(document.getElementById('f-total').value) || 0,
      supply: parseInt(document.getElementById('f-supply').value) || 0,
      location: document.getElementById('f-location').value.trim(),
      condition: document.getElementById('f-condition').value.trim(),
    };
    if (!item.name) { alert('Item name is required.'); return; }
    if (editingIndex !== null) {
      inventoryData[editingIndex] = item;
    } else {
      inventoryData.push(item);
    }
    closeModal();
    filterTable();
  }

  function deleteItem(idx) {
    if (confirm(`Delete "${inventoryData[idx].name}"?`)) {
      inventoryData.splice(idx, 1);
      filterTable();
    }
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Initial render
  renderTable(inventoryData);
</script>
