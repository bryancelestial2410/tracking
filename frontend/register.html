<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ToolTrack – Register</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark:  #1a4731;
      --green-mid:   #2d6a4f;
      --green-light: #52b788;
      --green-pale:  #d8f3dc;
      --green-mist:  #f0faf3;
      --white:       #ffffff;
      --gray-100:    #f7f9f8;
      --gray-300:    #d1d9d4;
      --gray-500:    #7a9187;
      --gray-700:    #3d5047;
      --text:        #1c2b23;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--green-mist);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, #b7e4c7 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -100px;
      width: 350px; height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, #95d5b2 0%, transparent 70%);
      pointer-events: none;
    }
    .wrapper {
      display: flex;
      width: 900px;
      min-height: 560px;
      background: var(--white);
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(26, 71, 49, 0.12);
      overflow: hidden;
      animation: rise 0.6s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .panel-left {
      width: 42%;
      background: linear-gradient(160deg, var(--green-dark) 0%, var(--green-mid) 100%);
      padding: 52px 44px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    .panel-left::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .panel-left::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .brand-name { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--white); }
    .panel-text { z-index: 1; }
    .panel-text h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 34px;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .panel-text p { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.7; }
    .panel-steps { z-index: 1; display: flex; flex-direction: column; gap: 14px; }
    .step { display: flex; align-items: center; gap: 12px; }
    .step-num {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--white);
      flex-shrink: 0;
    }
    .step span { font-size: 13px; color: rgba(255,255,255,0.8); }
    .panel-right {
      flex: 1;
      padding: 48px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    h3 { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); margin-bottom: 6px; }
    .subtitle { font-size: 13.5px; color: var(--gray-500); margin-bottom: 28px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 6px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--gray-300);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      appearance: none;
    }
    input:focus, select:focus { border-color: var(--green-light); box-shadow: 0 0 0 3px rgba(82,183,136,0.15); }
    input::placeholder { color: var(--gray-300); }
    .btn {
      width: 100%;
      padding: 13px;
      background: var(--green-dark);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 14.5px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      margin-top: 8px;
    }
    .btn:hover { background: var(--green-mid); box-shadow: 0 6px 20px rgba(26,71,49,0.2); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .alert { padding: 11px 14px; border-radius: 9px; font-size: 13px; margin-bottom: 16px; display: none; }
    .alert.success { background: var(--green-pale); color: var(--green-dark); border: 1px solid #95d5b2; display: block; }
    .alert.error { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6c6; display: block; }
    .bottom-link { text-align: center; margin-top: 18px; font-size: 13.5px; color: var(--gray-500); }
    .bottom-link a { color: var(--green-mid); font-weight: 600; text-decoration: none; }
    .bottom-link a:hover { text-decoration: underline; }
    @media (max-width: 720px) {
      .wrapper { flex-direction: column; width: 95vw; }
      .panel-left { width: 100%; padding: 32px; min-height: auto; }
      .panel-right { padding: 32px; }
      .row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="panel-left">
    <div class="brand">
      <div class="brand-icon">💉</div>
      <span class="brand-name">NCF CHS-CSR</span>
    </div>
    <div class="panel-text">
      <h2>Get started today.</h2>
      <p>Create your account and start managing tools and reservations with your team.</p>
    </div>
    <div class="panel-steps">
      <div class="step"><div class="step-num">1</div><span>Create your account</span></div>
      <div class="step"><div class="step-num">2</div><span>Browse available tools</span></div>
      <div class="step"><div class="step-num">3</div><span>Reserve & borrow instantly</span></div>
    </div>
  </div>
  <div class="panel-right">
    <h3>Create account</h3>
    <p class="subtitle">Fill in your details to get started</p>
    <div id="register-alert" class="alert"></div>
    <div class="row-2">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Juan Dela Cruz" />
      </div>
      <div class="field">
        <label>Role</label>
        <select id="reg-role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>gbox Address</label>
      <input type="email" id="reg-email" placeholder="gbox.ncf.edu.ph" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Min. 6 characters" />
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="reg-confirm" placeholder="Re-enter password" />
    </div>
    <button class="btn" id="register-btn" onclick="handleRegister()">Create Account</button>
    <div class="bottom-link">
      Already have an account? <a href="login.html">Sign in here</a>
    </div>
  </div>
</div>
<script>
  // ✅ New (Vercel - same domain)
  const API = 'https://nursing-eta.vercel.app';
  function showAlert(type, message) {
    const el = document.getElementById('register-alert');
    el.className = 'alert ' + type;
    el.textContent = message;
  }
  function setLoading(loading) {
    const btn = document.getElementById('register-btn');
    btn.disabled = loading;
    btn.textContent = loading ? 'Creating account...' : 'Create Account';
  }
  async function handleRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm = document.getElementById('reg-confirm').value;
    const role = document.getElementById('reg-role').value;
    if (!name || !email || !password || !confirm) { showAlert('error', 'Please fill in all fields.'); return; }
    if (password.length < 6) { showAlert('error', 'Password must be at least 6 characters.'); return; }
    if (password !== confirm) { showAlert('error', 'Passwords do not match.'); return; }
    setLoading(true);
    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, role })
      });
      const data = await res.json();
      if (!res.ok) { showAlert('error', data.message || 'Registration failed.'); return; }
      showAlert('success', '✅ Account created successfully! Redirecting to login...');
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    } catch (err) {
      showAlert('error', 'Cannot connect to server. Make sure backend is running.');
    } finally {
      setLoading(false);
    }
  }
  document.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleRegister(); });
</script>
</body>
</html>
